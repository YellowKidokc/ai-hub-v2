<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POF 2828 — Clipboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080c;
    --pane: #0e0e14;
    --card: #13131b;
    --card-hover: #171721;
    --card-selected: #161625;
    --border: #1c1c28;
    --border-sel: #2d2d48;
    --text: #b8bcc6;
    --text-secondary: #6a6a80;
    --bright: #dde0e8;
    --gold: #e8a912;
    --gold-dim: rgba(232, 169, 18, .12);
    --green: #2ecc8e;
    --green-dim: rgba(46, 204, 142, .10);
    --red: #d44;
    --cyan: #4ac4d4;
    --cyan-dim: rgba(74, 196, 212, .08);
    --purple: #8070c8;
    --purple-dim: rgba(128, 112, 200, .08);
    --font: 'DM Mono', 'Menlo', monospace;
    --fs: 13px;
    --lh: 1.55;
    --radius: 6px;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #222230; border-radius: 3px; }

  body {
    font-family: var(--font);
    font-size: var(--fs);
    line-height: var(--lh);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ───────── TOPBAR ───────── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--pane);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-shrink: 0;
  }
  .brand-name {
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .brand-label {
    color: var(--text-secondary);
    letter-spacing: 1px;
  }
  .topbar-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    flex-shrink: 0;
  }
  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 360px;
  }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 12px 7px 30px;
    color: var(--text);
    font: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: #2e2e3e; }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #2e2e3e;
    pointer-events: none;
  }
  .topbar-actions {
    display: flex;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .top-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 12px;
    border-radius: var(--radius);
    font: inherit;
    cursor: pointer;
    transition: all .12s;
    white-space: nowrap;
  }
  .top-btn:hover { border-color: var(--gold); color: var(--gold); }
  .top-btn.primary {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
    font-weight: 500;
  }
  .top-btn.primary:hover { filter: brightness(1.1); }

  /* ───────── SLOT RAIL ───────── */
  .slot-rail {
    display: flex;
    gap: 4px;
    padding: 8px 16px;
    background: var(--pane);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
  }
  .slot {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 9px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all .1s;
    flex-shrink: 0;
    min-width: 46px;
    max-width: 130px;
    color: var(--text-secondary);
  }
  .slot:hover { border-color: var(--gold); color: var(--text); }
  .slot:active { transform: scale(.96); }
  .slot-num {
    color: var(--gold);
    font-weight: 500;
    flex-shrink: 0;
    min-width: 14px;
  }
  .slot-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity: .6;
  }
  .slot.empty { opacity: .25; }
  .slot.filled { border-color: #24243a; }

  /* ───────── FILTER TABS ───────── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 6px 16px;
    background: var(--pane);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .filter-tab {
    padding: 5px 12px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-secondary);
    font: inherit;
    cursor: pointer;
    transition: all .1s;
  }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .filter-count {
    margin-left: auto;
    color: var(--text-secondary);
  }

  /* ───────── TWO‑PANE BODY ───────── */
  .body-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* LEFT: CLIP LIST */
  .list-pane {
    width: 420px;
    min-width: 320px;
    max-width: 50%;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--bg);
  }

  .card {
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .1s;
  }
  .card:hover { background: var(--card-hover); border-color: var(--border-sel); }
  .card.selected {
    background: var(--card-selected);
    border-color: var(--border-sel);
    box-shadow: inset 3px 0 0 var(--gold);
  }
  .card-title {
    font-weight: 500;
    color: var(--bright);
    margin-bottom: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-purpose {
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 8px;
  }
  .card-bottom {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    padding: 2px 8px;
    background: var(--cyan-dim);
    color: var(--cyan);
    border: 1px solid rgba(74, 196, 212, .15);
    border-radius: 3px;
    letter-spacing: .5px;
    text-transform: uppercase;
    font-size: 11px;
  }
  .pin-badge {
    padding: 2px 8px;
    background: var(--gold-dim);
    color: var(--gold);
    border-radius: 3px;
    font-size: 11px;
  }
  .slot-badge {
    padding: 2px 8px;
    background: var(--purple-dim);
    color: var(--purple);
    border-radius: 3px;
    font-size: 11px;
  }
  .card-time {
    margin-left: auto;
    color: #2e2e3e;
  }
  .card-actions {
    display: flex;
    gap: 4px;
    margin-top: 10px;
  }
  .card-btn {
    padding: 5px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-secondary);
    font: inherit;
    cursor: pointer;
    transition: all .1s;
  }
  .card-btn:hover { border-color: #3a3a50; color: var(--text); }
  .card-btn:active { transform: scale(.96); }
  .card-btn.copy-btn {
    background: var(--green-dim);
    border-color: rgba(46, 204, 142, .25);
    color: var(--green);
    font-weight: 500;
    flex: 1;
  }
  .card-btn.copy-btn:hover { background: rgba(46, 204, 142, .18); }

  /* RIGHT: DETAIL VIEW */
  .detail-pane {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background: var(--pane);
  }
  .detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #222230;
    text-align: center;
    padding: 40px;
    gap: 8px;
  }
  .detail-empty .sub { color: #1a1a28; }

  .detail-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-title {
    font-weight: 500;
    color: var(--bright);
    margin-bottom: 8px;
    word-break: break-word;
  }
  .detail-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .detail-actions {
    display: flex;
    gap: 6px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .det-btn {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font: inherit;
    cursor: pointer;
    transition: all .1s;
  }
  .det-btn:hover { border-color: #3a3a50; color: var(--text); }
  .det-btn:active { transform: scale(.97); }
  .det-btn.copy-main {
    background: var(--green);
    border-color: var(--green);
    color: #000;
    font-weight: 500;
  }
  .det-btn.copy-main:hover { filter: brightness(1.1); }
  .det-btn.danger { color: var(--red); border-color: rgba(221, 68, 68, .25); }
  .det-btn.danger:hover { background: rgba(221, 68, 68, .08); }

  .detail-content {
    flex: 1;
    padding: 20px 24px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    background: var(--bg);
    margin: 16px 24px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
    min-height: 120px;
  }

  .list-empty {
    text-align: center;
    padding: 40px 16px;
    color: #2e2e3e;
  }

  /* ───────── MODAL ───────── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .72);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .modal label {
    display: block;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 12px 0 4px;
    font-size: 11px;
  }
  .modal input, .modal textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .modal textarea { min-height: 140px; resize: vertical; }
  .modal input:focus, .modal textarea:focus { border-color: var(--gold); }
  .modal-row {
    display: flex;
    gap: 8px;
    margin-top: 18px;
    justify-content: flex-end;
  }
  .mbtn {
    padding: 9px 20px;
    border-radius: var(--radius);
    font: inherit;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all .1s;
  }
  .mbtn.save { background: var(--green); color: #000; border-color: var(--green); }
  .mbtn.save:hover { filter: brightness(1.1); }
  .mbtn.cancel { background: transparent; color: var(--text-secondary); }
  .mbtn.cancel:hover { border-color: #3a3a50; }

  /* ───────── TOAST ───────── */
  .toast {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--gold);
    color: #000;
    padding: 7px 22px;
    border-radius: 5px;
    font-weight: 500;
    letter-spacing: 1.5px;
    z-index: 200;
    transition: transform .18s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ───────── MOBILE ───────── */
  @media (max-width: 720px) {
    .list-pane { width: 100%; max-width: 100%; border-right: none; }
    .detail-pane { display: none; }
    .body-wrap.detail-open .list-pane { display: none; }
    .body-wrap.detail-open .detail-pane { display: flex; }
    .back-btn { display: inline-block !important; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-name">POF 2828</span>
    <span class="brand-label">Clipboard</span>
  </div>
  <div class="topbar-sep"></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="searchInput" placeholder="Search clips..." autocomplete="off">
  </div>
  <div class="topbar-actions">
    <button class="top-btn" onclick="exportData()">Export</button>
    <button class="top-btn" onclick="document.getElementById('fileInput').click()">Import</button>
    <button class="top-btn primary" onclick="openAdd()">+ New</button>
  </div>
</div>

<div class="slot-rail" id="slotRail"></div>

<div class="filter-bar">
  <button class="filter-tab active" data-f="all" onclick="setFilter('all')">All</button>
  <button class="filter-tab" data-f="pinned" onclick="setFilter('pinned')">Pinned</button>
  <button class="filter-tab" data-f="tagged" onclick="setFilter('tagged')">Tagged</button>
  <button class="filter-tab" data-f="slotted" onclick="setFilter('slotted')">Hotkeyed</button>
  <span class="filter-count" id="filterCount"></span>
</div>

<div class="body-wrap" id="bodyWrap">
  <div class="list-pane" id="listPane"></div>
  <div class="detail-pane" id="detailPane">
    <div class="detail-empty">Select a clip<span class="sub">Double-click any card to copy · Arrow keys to navigate · Enter to copy</span></div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">NEW CLIP</h2>
    <input type="hidden" id="editId">
    <label>Content</label>
    <textarea id="fContent" placeholder="Paste or type content..."></textarea>
    <label>Tags (comma separated)</label>
    <input id="fTags" placeholder="e.g. code, framework, url">
    <label>Hotkey Slot (1–20, blank for none)</label>
    <input id="fSlot" type="number" min="1" max="20" placeholder="e.g. 5">
    <div class="modal-row">
      <button class="mbtn cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn save" onclick="saveClip()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const STORE='pof2828_clips';
let clips=[],filter='all',search='',selIdx=-1;

function load(){try{clips=JSON.parse(localStorage.getItem(STORE))||[]}catch{clips=[]}}
function save(){localStorage.setItem(STORE,JSON.stringify(clips))}
function gid(){return 'c'+Date.now().toString(36)+Math.random().toString(36).substr(2,5)}

function renderAll(){renderSlots();renderList();renderDetail();renderCount()}

function renderSlots(){
  let h='';
  for(let i=1;i<=20;i++){
    const c=clips.find(x=>x.slot===i);
    const t=c?esc((c.content||'').replace(/\n/g,' ').substring(0,22)):'—';
    h+=`<div class="slot ${c?'filled':'empty'}" onclick="copySlot(${i})" title="${c?esc(c.content?.substring(0,200)):'Empty'}">
      <span class="slot-num">${i}</span><span class="slot-text">${t}</span></div>`;
  }
  document.getElementById('slotRail').innerHTML=h;
}

function getFiltered(){
  let f=clips;
  if(filter==='pinned')f=f.filter(c=>c.pinned);
  else if(filter==='tagged')f=f.filter(c=>c.tags?.length);
  else if(filter==='slotted')f=f.filter(c=>c.slot);
  if(search){const q=search.toLowerCase();f=f.filter(c=>(c.content||'').toLowerCase().includes(q)||(c.tags||[]).some(t=>t.toLowerCase().includes(q)))}
  return f;
}

function renderList(){
  const pane=document.getElementById('listPane'),f=getFiltered();
  if(!f.length){pane.innerHTML=`<div class="list-empty">${search?'No matches':'No clips yet'}</div>`;return}
  pane.innerHTML=f.map(c=>{
    const idx=clips.indexOf(c);
    const title=(c.content||'').split('\n')[0].substring(0,80)||'Untitled';
    const purpose=(c.content||'').split('\n').slice(1).join(' ').substring(0,90);
    const sel=idx===selIdx?' selected':'';
    return `<div class="card${sel}" onclick="selectClip(${idx})" ondblclick="copyIdx(${idx})">
      <div class="card-title">${esc(title)}</div>
      ${purpose?`<div class="card-purpose">${esc(purpose)}</div>`:''}
      <div class="card-bottom">
        ${c.pinned?'<span class="pin-badge">Pinned</span>':''}
        ${c.slot?`<span class="slot-badge">Slot ${c.slot}</span>`:''}
        ${(c.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
        <span class="card-time">${timeAgo(c.ts)}</span>
      </div>
      <div class="card-actions">
        <button class="card-btn copy-btn" onclick="event.stopPropagation();copyIdx(${idx})">Copy</button>
        <button class="card-btn" onclick="event.stopPropagation();openEdit(${idx})">Edit</button>
        <button class="card-btn" onclick="event.stopPropagation();togglePin(${idx})">${c.pinned?'Unpin':'Pin'}</button>
      </div>
    </div>`;
  }).join('');
}

function renderDetail(){
  const pane=document.getElementById('detailPane');
  if(selIdx<0||selIdx>=clips.length){
    pane.innerHTML=`<div class="detail-empty">Select a clip<span class="sub">Double-click to copy · Arrow keys to navigate · Enter to copy</span></div>`;
    return;
  }
  const c=clips[selIdx];
  const title=(c.content||'').split('\n')[0].substring(0,120)||'Untitled';
  pane.innerHTML=`
    <div class="detail-header">
      <button class="det-btn back-btn" style="display:none;margin-bottom:10px" onclick="closeMobileDetail()">← Back</button>
      <div class="detail-title">${esc(title)}</div>
      <div class="detail-meta">
        ${c.pinned?'<span class="pin-badge">Pinned</span>':''}
        ${c.slot?`<span class="slot-badge">Slot ${c.slot}</span>`:''}
        ${(c.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
        <span class="card-time">${timeAgo(c.ts)}</span>
      </div>
    </div>
    <div class="detail-actions">
      <button class="det-btn copy-main" onclick="copyIdx(${selIdx})">Copy to Clipboard</button>
      <button class="det-btn" onclick="openEdit(${selIdx})">Edit</button>
      <button class="det-btn" onclick="togglePin(${selIdx})">${c.pinned?'Unpin':'Pin'}</button>
      <button class="det-btn" onclick="assignSlot(${selIdx})">Assign Slot</button>
      <button class="det-btn danger" onclick="deleteClip(${selIdx})">Delete</button>
    </div>
    <div class="detail-content">${esc(c.content)}</div>`;
}

function renderCount(){
  document.getElementById('filterCount').textContent=getFiltered().length+' clips';
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.toggle('active',t.dataset.f===filter));
}

// ── ACTIONS ──
function selectClip(idx){
  selIdx=idx;renderList();renderDetail();
  if(window.innerWidth<=720)document.getElementById('bodyWrap').classList.add('detail-open');
}
function closeMobileDetail(){document.getElementById('bodyWrap').classList.remove('detail-open')}

function copyIdx(idx){if(idx>=0&&idx<clips.length)copyText(clips[idx].content)}
function copySlot(n){const c=clips.find(x=>x.slot===n);if(c)copyText(c.content);else toast('Slot '+n+' empty')}
function copyText(t){if(!t)return;navigator.clipboard.writeText(t).then(()=>toast('Copied')).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('Copied')})}

function togglePin(idx){
  clips[idx].pinned=!clips[idx].pinned;
  if(clips[idx].pinned){const it=clips.splice(idx,1)[0];clips.unshift(it);selIdx=0}
  save();renderAll();
}

function deleteClip(idx){
  if(!confirm('Delete this clip?'))return;
  clips.splice(idx,1);
  if(selIdx>=clips.length)selIdx=clips.length-1;
  save();renderAll();toast('Deleted');
}

function assignSlot(idx){
  const v=prompt('Assign hotkey slot (1-20, blank to clear):',clips[idx].slot||'');
  if(v===null)return;
  if(v===''){clips[idx].slot=null}else{
    const n=parseInt(v);if(isNaN(n)||n<1||n>20){toast('Invalid');return}
    clips.forEach(c=>{if(c.slot===n)c.slot=null});clips[idx].slot=n;
  }
  save();renderAll();toast('Updated');
}

function setFilter(f){filter=f;renderAll()}

// ── MODAL ──
function openAdd(){
  document.getElementById('modalTitle').textContent='NEW CLIP';
  document.getElementById('editId').value='';
  document.getElementById('fContent').value='';
  document.getElementById('fTags').value='';
  document.getElementById('fSlot').value='';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('fContent').focus(),80);
}
function openEdit(idx){
  const c=clips[idx];
  document.getElementById('modalTitle').textContent='EDIT CLIP';
  document.getElementById('editId').value=idx;
  document.getElementById('fContent').value=c.content;
  document.getElementById('fTags').value=(c.tags||[]).join(', ');
  document.getElementById('fSlot').value=c.slot||'';
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open')}

function saveClip(){
  const eidx=document.getElementById('editId').value;
  const content=document.getElementById('fContent').value.trim();
  if(!content){toast('Content required');return}
  const tags=document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  let slot=parseInt(document.getElementById('fSlot').value);
  if(isNaN(slot)||slot<1||slot>20)slot=null;
  if(slot)clips.forEach(c=>{if(c.slot===slot)c.slot=null});
  if(eidx!==''){const i=parseInt(eidx);clips[i].content=content;clips[i].tags=tags;clips[i].slot=slot;selIdx=i}
  else{clips.unshift({id:gid(),content,tags,slot,pinned:false,ts:new Date().toISOString()});selIdx=0}
  save();closeModal();renderAll();toast(eidx!==''?'Updated':'Added');
}

// ── IMPORT/EXPORT ──
function exportData(){
  const b=new Blob([JSON.stringify(clips,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`pof2828_clips_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);toast('Exported');
}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=function(ev){
    try{const d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw 0;
    const ids=new Set(clips.map(c=>c.id));let n=0;
    d.forEach(x=>{if(!x.id)x.id=gid();if(!ids.has(x.id)){if(!x.ts)x.ts=new Date().toISOString();clips.push(x);n++}});
    save();renderAll();toast('Imported '+n)}catch{toast('Invalid file')}
  };r.readAsText(file);e.target.value='';
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.ctrlKey&&!e.shiftKey&&e.key==='f'){e.preventDefault();document.getElementById('searchInput').focus()}
  if(e.ctrlKey&&e.shiftKey&&e.key==='N'){e.preventDefault();openAdd()}
  if(e.ctrlKey&&e.shiftKey&&e.key==='V'){e.preventDefault();
    navigator.clipboard.readText().then(t=>{if(t?.trim()){
      clips.unshift({id:gid(),content:t.trim(),tags:[],slot:null,pinned:false,ts:new Date().toISOString()});
      selIdx=0;save();renderAll();toast('Captured')}}).catch(()=>toast('Clipboard denied'))}
  if(e.ctrlKey&&e.shiftKey){
    let s=null;
    if(e.key>='1'&&e.key<='9')s=parseInt(e.key);
    else if(e.key==='0')s=10;
    else if(/^F([1-9]|10)$/.test(e.key))s=10+parseInt(e.key.substring(1));
    if(s>=1&&s<=20){e.preventDefault();copySlot(s)}}
  if((e.key==='ArrowDown'||e.key==='ArrowUp')&&document.activeElement.tagName!=='TEXTAREA'&&document.activeElement.tagName!=='INPUT'){
    const f=getFiltered();if(!f.length)return;e.preventDefault();
    const cur=f.indexOf(clips[selIdx]);
    const nxt=e.key==='ArrowDown'?(cur<f.length-1?cur+1:0):(cur>0?cur-1:f.length-1);
    selIdx=clips.indexOf(f[nxt]);renderList();renderDetail();
    const s=document.querySelector('.card.selected');if(s)s.scrollIntoView({block:'nearest'})}
  if(e.key==='Enter'&&!document.getElementById('modalBg').classList.contains('open')&&
    document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){
    if(selIdx>=0&&selIdx<clips.length)copyIdx(selIdx)}
});

document.getElementById('searchInput').addEventListener('input',e=>{search=e.target.value;renderAll()});

// ── HELPERS ──
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(iso){if(!iso)return'';const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';
  if(s<2592000)return Math.floor(s/86400)+'d';return Math.floor(s/2592000)+'mo'}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1400)}

// ── INIT ──
load();renderAll();
</script>
