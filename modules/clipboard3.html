.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center;padding:8px}.modal-bg.open{display:flex}.modal{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;width:100%;max-width:340px;max-height:85vh;overflow-y:auto}.modal h2{font-weight:500;color:var(--gold);letter-spacing:2px;margin-bottom:8px;font-size:10px}.modal label{display:block;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin:6px 0 2px;font-size:8px}.modal input,.modal textarea,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font:inherit;outline:none;font-size:10px}.modal textarea{min-height:80px;resize:vertical}.modal input:focus,.modal textarea:focus{border-color:var(--gold)}.mrow{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}.mbtn{padding:4px 12px;border-radius:6px;font:inherit;font-weight:500;cursor:pointer;border:1px solid var(--border);font-size:9px}.mbtn.save{background:var(--green);color:#000;border-color:var(--green)}.mbtn.cancel{background:transparent;color:var(--text2)}.empty{text-align:center;padding:30px 10px;color:#2a2d40;font-size:10px}

</style></head><body>
<div class="topbar"><div class="search-wrap"><span class="search-icon">&#x2315;</span><input class="search-input" id="searchInput" placeholder="Search clips..." autocomplete="off"></div><span class="status-dot" id="statusDot"></span><span class="brand">POF 2828</span></div>
<div class="tab-bar"><button class="tab active" data-tab="hotkeys" onclick="setTab('hotkeys')">Hotkeys</button><button class="tab" data-tab="history" onclick="setTab('history')">History</button><button class="tab" data-tab="ai" onclick="setTab('ai')">AI</button><span id="customTabs"></span><button class="tab" onclick="addCategory()" style="color:var(--gold);font-size:11px;min-width:20px" title="Add category">+</button></div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal"><h2 id="modalTitle">NEW CLIP</h2><input type="hidden" id="editId"><label>Content</label><textarea id="fContent" placeholder="Paste or type..."></textarea><label>Tags (comma sep)</label><input id="fTags" placeholder="code, url, note"><label>Slot (1-20)</label><input id="fSlot" type="number" min="1" max="20" placeholder="e.g. 5"><div class="mrow"><button class="mbtn cancel" onclick="closeModal()">Cancel</button><button class="mbtn save" onclick="saveClip()">Save</button></div></div></div>

<script>const API='http://localhost:3456/api',PS=100,WINDOW_TITLE='POF 2828 \u2014 Clipboard',POLL_INTERVAL=2000;let clips=[],sel=-1,pg=0,tab='hotkeys',search='',pinned=false,categories=JSON.parse(localStorage.getItem('pof_categories')||'[]'),aiMessages=JSON.parse(localStorage.getItem('pof_ai_messages')||'[]'),serverOnline=false;async function load(){try{const r=await fetch(API+'/clips?limit=2000');if(r.ok){const d=await r.json();if(Array.isArray(d))clips=d;serverOnline=true}else serverOnline=false}catch{serverOnline=false}document.getElementById('statusDot').classList.toggle('offline',!serverOnline)}async function cCreate(c){try{await fetch(API+'/clips',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)})}catch{}}async function cSave(c){try{await fetch(API+'/clips/'+c.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)})}catch{}}async function cDel(id){try{await fetch(API+'/clips/'+id,{method:'DELETE'})}catch{}}async function togglePin(force){pinned=typeof force==='boolean'?force:!pinned;document.getElementById('btnPin').classList.toggle('on',pinned);try{const r=await fetch(API.replace('/api','')+'/window/pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:WINDOW_TITLE,pinned})});if(!r.ok)throw new Error();toast(pinned?'Pinned':'Unpinned')}catch{toast('Pin: server error')}}async function saveWindowPos(){const pos={x:screenX,y:screenY,w:outerWidth,h:outerHeight};localStorage.setItem('pof_pos',JSON.stringify(pos));try{await fetch(API.replace('/api','')+'/window/position',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:WINDOW_TITLE,...pos})});toast('Position saved')}catch{toast('Saved locally')}}async function restoreWindowPos(){try{const r=await fetch(API+'/window-state');if(r.ok){const state=await r.json();const pos=state.position;const pin=state.pin;if(pos&&typeof pos.x==='number'){resizeTo(pos.w||outerWidth,pos.h||outerHeight);moveTo(pos.x,pos.y)}if(pin&&pin.pinned){pinned=true;document.getElementById('btnPin').classList.add('on');setTimeout(()=>togglePin(true),200)}}}catch{}}function gid(){return'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}function sig(){return clips.length+':'+(clips[0]?.id||'')+':'+(clips[clips.length-1]?.id||'')}function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}function clipTitle(c,max=50){return esc((c.content||'').split('\n')[0].slice(0,max))}function clipPreview(c,max=140){return esc((c.content||'').replace(/\s+/g,' ').trim().slice(0,max))}function formatTs(ts){if(!ts)return'';try{const d=new Date(ts);if(isNaN(d.getTime()))return'';const diff=(Date.now()-d.getTime())/1000;if(diff<60)return'now';if(diff<3600)return Math.floor(diff/60)+'m';if(diff<86400)return Math.floor(diff/3600)+'h';return Math.floor(diff/86400)+'d'}catch{return''}}function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1200)}function filteredClips(list){const q=search.toLowerCase();if(!q)return list;return list.filter(c=>(c.content||'').toLowerCase().includes(q)||(c.tags||[]).some(t=>t.toLowerCase().includes(q)))}function saveCategories(){localStorage.setItem('pof_categories',JSON.stringify(categories))}function setTab(t){tab=t;pg=0;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));render()}function addCategory(){const name=prompt('Category name:');if(!name||!name.trim())return;const id=name.trim().toLowerCase().replace(/\s+/g,'_');if(categories.find(c=>c.id===id)){toast('Exists');return}categories.push({id,name:name.trim()});saveCategories();renderTabs();setTab(id);toast('Added: '+name.trim())}function renderTabs(){document.getElementById('customTabs').innerHTML=categories.map(c=>`<button class="tab ${tab===c.id?'active':''}" data-tab="${c.id}" onclick="setTab('${c.id}')" oncontextmenu="event.preventDefault();removeCategory('${c.id}')">${esc(c.name)}</button>`).join('')}function removeCategory(id){if(!confirm('Remove this category?'))return;categories=categories.filter(c=>c.id!==id);saveCategories();if(tab===id)tab='hotkeys';renderTabs();render();toast('Removed')}function render(){const area=document.getElementById('cardArea');if(tab==='hotkeys'){renderHotkeys(area);return}if(tab==='ai'){renderAI(area);return}let list=tab==='history'?clips:clips.filter(c=>(c.categories||[]).includes(tab));list=filteredClips(list);renderHistory(area,list)}function renderHotkeys(area){const slotMap=new Map(clips.filter(c=>c.slot).map(c=>[String(c.slot),c]));let h='<div class="slot-grid">';for(let n=1;n<=20;n++){const c=slotMap.get(String(n));if(c){const idx=clips.indexOf(c);h+=`<div class="slot-card filled" onclick="copyIdx(${idx})"><div class="slot-head"><span class="slot-num">SLOT ${n}</span><span class="slot-state">ready</span></div><div class="slot-body"><div class="slot-title">${clipTitle(c,30)}</div><div class="slot-preview">${clipPreview(c,70)}</div></div><div class="slot-actions"><button class="slot-btn copy" onclick="event.stopPropagation();copyIdx(${idx})">COPY</button><button class="slot-btn edit" onclick="event.stopPropagation();openEdit(${idx})">&#x270F;</button><button class="slot-btn clear" onclick="event.stopPropagation();clearSlot(${idx})">&#xD7;</button></div></div>`}else{h+=`<div class="slot-card"><div class="slot-head"><span class="slot-num">SLOT ${n}</span><span class="slot-state" style="color:#1a1d2a">&mdash;</span></div><div class="slot-body"><div class="slot-preview" style="color:#1a1d2a">Empty slot</div></div><div class="slot-actions"><button class="slot-btn" onclick="openAddWithSlot(${n})">+ SAVE</button></div></div>`}}area.innerHTML=h+'</div>';document.getElementById('pn').textContent=1;document.getElementById('pt').textContent=1;document.getElementById('cc').textContent='20 slots'}function renderHistory(area,list){const pinnedItems=list.filter(c=>c.pinned);const flowingItems=list.filter(c=>!c.pinned);const tp=Math.ceil(flowingItems.length/PS)||1;pg=Math.min(pg,tp-1);const paged=flowingItems.slice(pg*PS,(pg+1)*PS);document.getElementById('pn').textContent=pg+1;document.getElementById('pt').textContent=tp;document.getElementById('cc').textContent=list.length+' clips';if(!pinnedItems.length&&!paged.length){area.innerHTML='<div class="empty">No clips yet</div>';return}let h='<div class="history-list">';if(pinnedItems.length){h+='<div class="section-hdr"><span class="ctag pin">&#x1F4CC; Pinned</span></div>';pinnedItems.forEach(c=>{h+=buildHistoryRow(c,true)})}if(paged.length){if(pinnedItems.length)h+='<div class="section-hdr"><span class="ctag">History</span></div>';paged.forEach(c=>{h+=buildHistoryRow(c,false)})}area.innerHTML=h+'</div>'}function buildHistoryRow(c,isPinned){const idx=clips.indexOf(c);const tags=(c.tags||[]).slice(0,3).map(t=>`<span class="ctag">${esc(t)}</span>`).join('');const slotTag=c.slot?`<span class="ctag slot">S${c.slot}</span>`:'';return`<div class="history-row${isPinned?' pinned-row':''}" ondblclick="copyIdx(${idx})"><div class="history-head"><div class="history-meta"><div class="history-title">${clipTitle(c,70)}</div><div class="history-preview">${clipPreview(c,220)}</div></div><div class="history-side"><div class="history-time">${formatTs(c.created_at||c.ts)}</div><div class="card-tags">${slotTag}${tags}</div></div></div><div class="history-actions"><button class="hbtn copy" onclick="copyIdx(${idx})">&#x1F4CB; COPY</button><button class="hbtn icon${c.pinned?' active':''}" onclick="togglePinClip(${idx})" title="Pin">${c.pinned?'\u2605':'\u2606'}</button><button class="hbtn icon" onclick="openEdit(${idx})" title="Edit">&#x270F;</button><button class="hbtn icon" onclick="addToCategory(${idx})" title="Folder">&#x1F4C1;</button><button class="hbtn icon" onclick="delClip(${idx})" title="Delete">&#x1F5D1;</button></div></div>`}function renderAI(area){const msgs=aiMessages.map(m=>`<div class="ai-msg ${m.role}">${esc(m.text)}</div>`).join('');area.innerHTML=`<div class="ai-panel"><div class="ai-status"><div class="ai-status-dot" id="aiDot"></div><div class="ai-status-text">Claude (manager) + GPT (workhorse) &middot; ${clips.length} clips in store</div></div><div class="ai-actions"><div class="ai-btn" onclick="aiAction('dedupe')"><div class="ai-btn-title">&#x1F9F9; DEDUPE</div><div class="ai-btn-desc">Remove exact &amp; near duplicates</div></div><div class="ai-btn" onclick="aiAction('summarize')"><div class="ai-btn-title">&#x1F4DD; SUMMARIZE</div><div class="ai-btn-desc">Condense clipboard history</div></div><div class="ai-btn" onclick="aiAction('categorize')"><div class="ai-btn-title">&#x1F4C2; CATEGORIZE</div><div class="ai-btn-desc">Auto-tag and sort clips</div></div><div class="ai-btn" onclick="aiAction('archive')"><div class="ai-btn-title">&#x2601;&#xFE0F; ARCHIVE</div><div class="ai-btn-desc">Important &rarr; R2 cloud</div></div></div><div class="ai-chat"><div class="ai-messages" id="aiMsgs">${msgs||'<div class="ai-msg system">Ask me about your clips, or use the buttons above.</div>'}</div><div class="ai-input-row"><textarea class="ai-input" id="aiInput" placeholder="Ask about your clips..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();aiSend()}"></textarea><button class="ai-send" id="aiSendBtn" onclick="aiSend()">SEND</button></div></div></div>`;const el=document.getElementById('aiMsgs');if(el)el.scrollTop=el.scrollHeight}async function aiAction(action){addAiMsg('user',action.toUpperCase()+' requested');addAiMsg('system','Processing...');render();try{const r=await fetch(API+'/ai/'+action,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action})});const data=await r.json();aiMessages=aiMessages.filter(m=>m.text!=='Processing...');addAiMsg('assistant',data.message||data.result||JSON.stringify(data));if(data.reloaded)await load();render();toast(action+' done')}catch(e){aiMessages=aiMessages.filter(m=>m.text!=='Processing...');addAiMsg('assistant','Error: server unreachable. Is sync_server.py running?');render()}}async function aiSend(){const input=document.getElementById('aiInput');const text=(input?.value||'').trim();if(!text)return;input.value='';addAiMsg('user',text);addAiMsg('system','Thinking...');render();try{const r=await fetch(API+'/ai/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,clip_count:clips.length})});const data=await r.json();aiMessages=aiMessages.filter(m=>m.text!=='Thinking...');addAiMsg('assistant',data.response||data.message||'No response');render()}catch{aiMessages=aiMessages.filter(m=>m.text!=='Thinking...');addAiMsg('assistant','Error: AI endpoint not available yet. Add /api/ai/* to sync_server.py');render()}}function addAiMsg(role,text){aiMessages.push({role,text,ts:Date.now()});if(aiMessages.length>50)aiMessages=aiMessages.slice(-50);localStorage.setItem('pof_ai_messages',JSON.stringify(aiMessages))}function copyIdx(i){navigator.clipboard.writeText(clips[i].content).then(()=>toast('Copied')).catch(()=>{const ta=document.createElement('textarea');ta.value=clips[i].content;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied')})}function togglePinClip(i){clips[i].pinned=!clips[i].pinned;cSave(clips[i]);render();toast(clips[i].pinned?'Pinned':'Unpinned')}function delClip(i){if(!confirm('Delete?'))return;const id=clips[i].id;clips.splice(i,1);cDel(id);render();toast('Deleted')}function clearSlot(i){clips[i].slot=null;cSave(clips[i]);render();toast('Slot cleared')}function moveSelUp(){}function moveSelDown(){}function navPage(d){pg=Math.max(0,pg+d);render()}async function deduplicate(){const seen=new Set();const dupes=[];const keep=[];for(const c of clips){const key=(c.content||'').trim();if(!key||(seen.has(key)&&!c.pinned&&!c.slot)){if(key)dupes.push(c.id)}else{seen.add(key);keep.push(c)}}if(!dupes.length){toast('No duplicates');return}if(!confirm(`Delete ${dupes.length} duplicates?`))return;for(const id of dupes)await cDel(id);clips=keep;render();toast(`Removed ${dupes.length} dupes`)}function addToCategory(idx){if(!categories.length){toast('No categories');return}const names=categories.map(c=>c.name).join(', ');const pick=prompt('Category ('+names+'):');if(!pick)return;const cat=categories.find(c=>c.name.toLowerCase()===pick.trim().toLowerCase()||c.id===pick.trim().toLowerCase());if(!cat){toast('Not found');return}if(!clips[idx].categories)clips[idx].categories=[];if(!clips[idx].categories.includes(cat.id))clips[idx].categories.push(cat.id);cSave(clips[idx]);render();toast('Added to '+cat.name)}function openAdd(slot=''){document.getElementById('modalTitle').textContent='NEW CLIP';document.getElementById('editId').value='';document.getElementById('fContent').value='';document.getElementById('fTags').value='';document.getElementById('fSlot').value=slot;document.getElementById('modalBg').classList.add('open');setTimeout(()=>document.getElementById('fContent').focus(),80)}function openAddWithSlot(slot){openAdd(slot)}function openEdit(i){const c=clips[i];document.getElementById('modalTitle').textContent='EDIT';document.getElementById('editId').value=i;document.getElementById('fContent').value=c.content;document.getElementById('fTags').value=(c.tags||[]).join(', ');document.getElementById('fSlot').value=c.slot||'';document.getElementById('modalBg').classList.add('open')}function closeModal(){document.getElementById('modalBg').classList.remove('open')}function saveClip(){const ei=document.getElementById('editId').value;const ct=document.getElementById('fContent').value.trim();if(!ct){toast('Empty');return}const tg=document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean);let sl=parseInt(document.getElementById('fSlot').value);if(isNaN(sl)||sl<1||sl>20)sl=null;if(sl)clips.forEach(c=>{if(c.slot===sl)c.slot=null});if(ei!==''){const i=parseInt(ei);clips[i].content=ct;clips[i].tags=tg;clips[i].slot=sl;cSave(clips[i])}else{const nc={id:gid(),content:ct,tags:tg,slot:sl,pinned:false,ts:new Date().toISOString(),created_at:new Date().toISOString()};clips.unshift(nc);cCreate(nc)}closeModal();render();toast(ei!==''?'Updated':'Added')}function exportData(){const b=new Blob([JSON.stringify(clips,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pof2828_clips_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Exported')}function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw 0;const ids=new Set(clips.map(c=>c.id));let n=0;d.forEach(x=>{if(!x.id)x.id=gid();if(!ids.has(x.id)){x.ts=x.ts||new Date().toISOString();clips.push(x);cCreate(x);n++}});render();toast(n+' imported')}catch{toast('Bad file')}};r.readAsText(f);e.target.value=''}document.addEventListener('keydown',e=>{const m=document.getElementById('modalBg').classList.contains('open');const inp=['INPUT','TEXTAREA'].includes(document.activeElement.tagName);if(e.key==='Escape'){if(m)closeModal();return}if(m||inp)return;if(e.key==='ArrowLeft'){e.preventDefault();navPage(-1)}if(e.key==='ArrowRight'){e.preventDefault();navPage(1)}if(e.ctrlKey&&e.key==='f'){e.preventDefault();document.getElementById('searchInput').focus()}if(e.ctrlKey&&e.shiftKey&&e.key==='N'){e.preventDefault();openAdd()}});document.getElementById('searchInput').addEventListener('input',e=>{search=e.target.value;pg=0;render()});async function init(){restoreWindowPos();await load();renderTabs();render()}init();let lsig='';setInterval(async()=>{const o=lsig;await load();const n=sig();if(o&&n!==o){render()}lsig=n},POLL_INTERVAL);

// ═══ FILES PANEL ═══
const FILE_FOLDERS={
  documents:{label:'Documents',icon:'\u{1F4C4}'},
  videos:{label:'Videos',icon:'\u{1F3AC}'},
  music:{label:'Music',icon:'\u{1F3B5}'},
  pictures:{label:'Pictures',icon:'\u{1F5BC}'}
};
const FILE_ICONS={
  pdf:'\u{1F4D5}',doc:'\u{1F4DD}',docx:'\u{1F4DD}',txt:'\u{1F4C3}',md:'\u{1F4C3}',
  mp4:'\u{1F3AC}',mkv:'\u{1F3AC}',avi:'\u{1F3AC}',mov:'\u{1F3AC}',webm:'\u{1F3AC}',
  mp3:'\u{1F3B5}',wav:'\u{1F3B5}',flac:'\u{1F3B5}',ogg:'\u{1F3B5}',m4a:'\u{1F3B5}',
  jpg:'\u{1F5BC}',jpeg:'\u{1F5BC}',png:'\u{1F5BC}',gif:'\u{1F5BC}',webp:'\u{1F5BC}',svg:'\u{1F5BC}',bmp:'\u{1F5BC}',
  zip:'\u{1F4E6}',rar:'\u{1F4E6}','7z':'\u{1F4E6}',
  xlsx:'\u{1F4CA}',xls:'\u{1F4CA}',csv:'\u{1F4CA}',
  pptx:'\u{1F4CA}',json:'\u{2699}',html:'\u{1F310}',js:'\u{2699}',py:'\u{2699}'
};
let activeFolder=null;

function getFileIcon(name){
  const ext=(name.split('.').pop()||'').toLowerCase();
  return FILE_ICONS[ext]||'\u{1F4C4}';
}

function formatFileSize(bytes){
  if(!bytes||bytes<0)return'';
  if(bytes<1024)return bytes+'B';
  if(bytes<1048576)return(bytes/1024).toFixed(1)+'K';
  if(bytes<1073741824)return(bytes/1048576).toFixed(1)+'M';
  return(bytes/1073741824).toFixed(1)+'G';
}

function toggleFiles(folder){
  const panel=document.getElementById('filesPanel');
  const btns=document.querySelectorAll('.fbtn');
  if(activeFolder===folder){closeFiles();return;}
  activeFolder=folder;
  btns.forEach(b=>b.classList.toggle('active',b.dataset.folder===folder));
  document.getElementById('fpTitle').textContent=FILE_FOLDERS[folder].label;
  document.getElementById('fpList').innerHTML='<div class="fp-loading">Loading...</div>';
  panel.classList.add('open');
  loadFiles(folder);
}

function closeFiles(){
  activeFolder=null;
  document.getElementById('filesPanel').classList.remove('open');
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
}

async function loadFiles(folder){
  const list=document.getElementById('fpList');
  try{
    const r=await fetch(API+'/files/'+folder);
    if(!r.ok)throw new Error('Server returned '+r.status);
    const files=await r.json();
    if(!files.length){list.innerHTML='<div class="fp-empty">Folder empty</div>';return;}
    list.innerHTML=files.map(f=>`<div class="fp-item" onclick="openFile('${esc(f.path.replace(/\\/g,'\\\\').replace(/'/g,"\\'"))}')">
      <span class="fp-item-icon">${getFileIcon(f.name)}</span>
      <span class="fp-item-name" title="${esc(f.name)}">${esc(f.name)}</span>
      <span class="fp-item-size">${formatFileSize(f.size)}</span>
    </div>`).join('');
  }catch(e){
    list.innerHTML='<div class="fp-empty">'+esc(e.message)+'<br><span style="font-size:8px;color:#3a3d50">Start sync_server.py with file endpoints</span></div>';
  }
}

function openFile(path){
  // Try to open via the server, fallback to copying path
  fetch(API+'/files/open',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})})
    .then(r=>{if(r.ok)toast('Opened');else throw 0;})
    .catch(()=>{navigator.clipboard.writeText(path).then(()=>toast('Path copied'));});
}</script></body></html>
