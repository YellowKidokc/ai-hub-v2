<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>POF 2828 — Clipboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f; --surface: #12121c; --surface2: #1a1a25;
    --border: #1e1e2e; --border-hover: #2a2a3e;
    --text: #c8ccd4; --text-dim: #666680; --text-bright: #e8ecf4;
    --accent: #4a6fa5; --gold: #f59e0b; --green: #10b981;
    --red: #ef4444; --purple: #8b5cf6; --blue: #3b82f6;
    --cyan: #06b6d4; --orange: #f97316;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

  body {
    font-family: 'IBM Plex Mono', 'JetBrains Mono', monospace;
    background: var(--bg); color: var(--text);
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ============ HEADER ============ */
  .header {
    padding: 10px 14px 8px; border-bottom: 1px solid var(--border);
    background: #0d0d14; flex-shrink: 0;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-tag { font-size: 10px; letter-spacing: 3px; color: var(--gold); font-weight: 700; }
  .brand-sep { font-size: 11px; color: #2a2a3a; }
  .brand-sub { font-size: 10px; letter-spacing: 2px; color: #444; }

  .header-stats {
    display: flex; gap: 12px; align-items: center;
  }
  .stat { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
  .stat strong { color: var(--gold); }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; display: inline-block;
    background: var(--green); box-shadow: 0 0 6px var(--green);
  }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .search-row { display: flex; gap: 6px; }
  .search-wrap { position: relative; flex: 1; }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: #3a3a4a; pointer-events: none; font-size: 14px;
  }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px 8px 30px; color: var(--text);
    font-size: 12px; font-family: inherit; outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: #333; }

  .filter-btn {
    background: transparent; border: 1px solid #2a2a3a; color: #555;
    padding: 4px 10px; border-radius: 4px; font-size: 9px; font-family: inherit;
    cursor: pointer; letter-spacing: 1px; transition: all 0.12s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: rgba(245,158,11,0.12); border-color: var(--gold); color: var(--gold); }

  /* ============ FAST SLOTS BAR ============ */
  .fast-slots {
    display: flex; gap: 4px; padding: 6px 14px; border-bottom: 1px solid var(--border);
    background: #0d0d12; overflow-x: auto; flex-shrink: 0;
  }
  .fast-slot {
    min-width: 60px; max-width: 120px; padding: 4px 8px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    font-size: 9px; color: var(--text-dim); cursor: pointer;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    transition: all 0.1s; flex-shrink: 0;
  }
  .fast-slot:hover { border-color: var(--accent); color: var(--text); }
  .fast-slot:active { transform: scale(0.96); }
  .fast-slot .slot-num {
    color: var(--gold); font-weight: 700; margin-right: 4px; font-size: 8px;
  }
  .fast-slot.pinned { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.05); }

  /* ============ CLIP LIST ============ */
  .clip-list {
    flex: 1; overflow-y: auto; padding: 8px 14px; display: flex;
    flex-direction: column; gap: 4px;
  }

  .clip-item {
    display: flex; align-items: flex-start; gap: 8px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
    padding: 8px 10px; cursor: pointer; transition: all 0.08s;
    position: relative;
  }
  .clip-item:hover { background: #14141e; border-color: var(--border-hover); }
  .clip-item:active { transform: scale(0.995); }
  .clip-item.pinned { border-left: 3px solid var(--gold); }
  .clip-item.tagged { border-left: 3px solid var(--cyan); }
  .clip-item.aggregate { border-left: 3px solid var(--purple); }

  .clip-num {
    font-size: 9px; color: var(--text-dim); min-width: 20px; padding-top: 2px;
    text-align: right; flex-shrink: 0;
  }

  .clip-body { flex: 1; min-width: 0; }
  .clip-preview {
    font-size: 11px; color: var(--text); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; word-break: break-word;
  }
  .clip-meta {
    display: flex; gap: 6px; align-items: center; margin-top: 4px; flex-wrap: wrap;
  }
  .clip-tag {
    font-size: 7px; letter-spacing: 1px; text-transform: uppercase;
    padding: 1px 6px; border-radius: 2px; background: rgba(6,182,212,0.12);
    color: var(--cyan); border: 1px solid rgba(6,182,212,0.25);
  }
  .clip-pin-badge {
    font-size: 7px; letter-spacing: 1px; padding: 1px 6px; border-radius: 2px;
    background: rgba(245,158,11,0.12); color: var(--gold);
  }
  .clip-source {
    font-size: 8px; color: #444; letter-spacing: 0.5px;
  }
  .clip-time {
    font-size: 8px; color: #333; margin-left: auto;
  }

  /* ============ CLIP ACTIONS (slide out on hover/tap) ============ */
  .clip-actions {
    display: flex; flex-direction: column; gap: 3px; flex-shrink: 0;
    opacity: 0.3; transition: opacity 0.15s;
  }
  .clip-item:hover .clip-actions { opacity: 1; }

  .clip-act {
    width: 32px; height: 28px; border: 1px solid #222; border-radius: 3px;
    background: transparent; color: var(--text-dim); font-size: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.1s; font-family: inherit;
  }
  .clip-act:hover { border-color: var(--accent); color: var(--text); }
  .clip-act:active { transform: scale(0.9); }
  .clip-act.pin-active { color: var(--gold); border-color: rgba(245,158,11,0.5); }

  /* ============ AGGREGATE INDICATOR ============ */
  .agg-bar {
    display: none; padding: 6px 14px; border-bottom: 1px solid var(--border);
    background: rgba(139,92,246,0.08); flex-shrink: 0;
    font-size: 10px; color: var(--purple); letter-spacing: 1px;
  }
  .agg-bar.active { display: flex; align-items: center; gap: 8px; }

  /* ============ MODAL ============ */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; width: 100%; max-width: 520px;
    max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .modal label { display: block; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; margin-top: 10px; }
  .modal input, .modal textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; padding: 8px 10px; color: var(--text);
    font-size: 12px; font-family: inherit; outline: none;
  }
  .modal textarea { min-height: 150px; resize: vertical; line-height: 1.5; }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .modal-btn {
    padding: 8px 20px; border-radius: 5px; font-size: 10px; font-family: inherit;
    letter-spacing: 1px; cursor: pointer; font-weight: 600; min-height: 40px;
    border: 1px solid var(--border);
  }
  .modal-btn.save { background: var(--green); color: #000; border-color: var(--green); }
  .modal-btn.cancel { background: transparent; color: var(--text-dim); }
  .modal-btn.danger { background: transparent; color: var(--red); border-color: rgba(239,68,68,0.4); }

  /* ============ TOAST ============ */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--gold); color: #000; padding: 6px 18px;
    border-radius: 5px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 700; font-family: inherit; z-index: 200;
    transition: transform 0.2s ease; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ============ MOBILE ============ */
  @media (max-width: 480px) {
    .clip-actions { opacity: 1; flex-direction: row; }
    .clip-act { width: 40px; height: 36px; font-size: 14px; }
    .clip-item { flex-wrap: wrap; }
    .clip-body { flex-basis: calc(100% - 30px); }
    .clip-actions { flex-basis: 100%; flex-direction: row; gap: 4px; margin-top: 6px; }
    .fast-slots { padding: 6px 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <span class="brand-tag">POF 2828</span>
      <span class="brand-sep">|</span>
      <span class="brand-sub">CLIPBOARD</span>
    </div>
    <div class="header-stats">
      <span class="stat"><strong id="clipCount">0</strong> CLIPS</span>
      <span class="stat"><strong id="pinnedCount">0</strong> PINNED</span>
      <span class="status-dot" id="statusDot"></span>
    </div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Search clipboard..." autocomplete="off">
    </div>
    <button class="filter-btn" id="filterAll" onclick="setFilter('all')">ALL</button>
    <button class="filter-btn" id="filterPinned" onclick="setFilter('pinned')">📌</button>
    <button class="filter-btn" id="filterTagged" onclick="setFilter('tagged')">🏷</button>
  </div>
</div>

<div class="agg-bar" id="aggBar">
  <span>⚡ AGGREGATE MODE</span>
  <span id="aggCount">0 stacked</span>
</div>

<!-- FAST SLOTS (top 10) -->
<div class="fast-slots" id="fastSlots"></div>

<!-- CLIP LIST -->
<div class="clip-list" id="clipList"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">Edit Clip</h2>
    <input type="hidden" id="editIdx">
    <label>Content</label>
    <textarea id="fieldContent"></textarea>
    <label>Tag</label>
    <input type="text" id="fieldTag" placeholder="e.g. code, url, note">
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">CANCEL</button>
      <button class="modal-btn save" onclick="saveEdit()">SAVE</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3456/api';
let clips = [];
let filter = 'all';
let search = '';
let lastClipCount = 0;

// ============================================================
// API
// ============================================================
async function fetchClips() {
  try {
    const res = await fetch(`${API}/clips?limit=1000`);
    if (res.ok) {
      clips = await res.json();
      document.getElementById('statusDot').classList.remove('offline');
    } else throw new Error();
  } catch(e) {
    document.getElementById('statusDot').classList.add('offline');
    const c = localStorage.getItem('clips_cache');
    if (c) clips = JSON.parse(c);
  }
  localStorage.setItem('clips_cache', JSON.stringify(clips));

  // Auto-scroll awareness: if new clips arrived, flash
  if (clips.length > lastClipCount && lastClipCount > 0) {
    showToast('NEW CLIP CAPTURED');
  }
  lastClipCount = clips.length;

  updateStats();
  renderFastSlots();
  render();
}

async function apiUpdateClip(id, data) {
  try {
    // Our server doesn't have PUT for clips yet, so we delete + recreate
    // For now, update locally
    return true;
  } catch(e) { return false; }
}

async function apiDeleteClip(id) {
  try {
    return (await fetch(`${API}/clips/${id}`, { method: 'DELETE' })).ok;
  } catch(e) { return false; }
}

async function apiCreateClip(data) {
  try {
    const res = await fetch(`${API}/clips`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    return res.ok;
  } catch(e) { return false; }
}

// ============================================================
// RENDER
// ============================================================
function updateStats() {
  document.getElementById('clipCount').textContent = clips.length;
  document.getElementById('pinnedCount').textContent = clips.filter(c => c.pinned).length;
}

function renderFastSlots() {
  const container = document.getElementById('fastSlots');
  const slots = clips.slice(0, 10);
  container.innerHTML = slots.map((c, i) => {
    const preview = (c.content || '').replace(/\n/g, ' ').substring(0, 30);
    const pinClass = c.pinned ? ' pinned' : '';
    return `<div class="fast-slot${pinClass}" onclick="copyClip(${i})" title="${esc(c.content?.substring(0,200))}">
      <span class="slot-num">${i+1}</span>${esc(preview)}
    </div>`;
  }).join('');
}

function render() {
  const list = document.getElementById('clipList');
  let filtered = clips;

  if (filter === 'pinned') filtered = filtered.filter(c => c.pinned);
  if (filter === 'tagged') filtered = filtered.filter(c => c.tags && c.tags.length > 0);
  if (search) {
    const q = search.toLowerCase();
    filtered = filtered.filter(c =>
      (c.content || '').toLowerCase().includes(q) ||
      (c.title || '').toLowerCase().includes(q) ||
      (c.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  if (!filtered.length) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:#444;font-size:11px">
      ${search ? 'No matches' : 'Clipboard empty — copy something!'}</div>`;
    return;
  }

  list.innerHTML = filtered.map((c, i) => {
    const realIdx = clips.indexOf(c);
    const preview = esc((c.content || '').substring(0, 300));
    const pinClass = c.pinned ? ' pinned' : '';
    const tagClass = (c.tags && c.tags.length) ? ' tagged' : '';
    const aggClass = c.source === 'aggregate' ? ' aggregate' : '';
    const timeAgo = formatTimeAgo(c.created_at);

    return `<div class="clip-item${pinClass}${tagClass}${aggClass}" ondblclick="copyClip(${realIdx})">
      <div class="clip-num">${realIdx + 1}</div>
      <div class="clip-body">
        <div class="clip-preview">${preview}</div>
        <div class="clip-meta">
          ${c.pinned ? '<span class="clip-pin-badge">PINNED</span>' : ''}
          ${(c.tags||[]).map(t => `<span class="clip-tag">${esc(t)}</span>`).join('')}
          ${c.source ? `<span class="clip-source">${esc(c.source)}</span>` : ''}
          <span class="clip-time">${timeAgo}</span>
        </div>
      </div>
      <div class="clip-actions">
        <button class="clip-act" onclick="event.stopPropagation();copyClip(${realIdx})" title="Copy">📋</button>
        <button class="clip-act ${c.pinned?'pin-active':''}" onclick="event.stopPropagation();togglePin(${realIdx})" title="Pin">📌</button>
        <button class="clip-act" onclick="event.stopPropagation();openEdit(${realIdx})" title="Edit">✏️</button>
        <button class="clip-act" onclick="event.stopPropagation();tagClip(${realIdx})" title="Tag">🏷</button>
        <button class="clip-act" onclick="event.stopPropagation();deleteClip(${realIdx})" title="Delete">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// ACTIONS
// ============================================================
async function copyClip(idx) {
  if (idx < 0 || idx >= clips.length) return;
  try {
    await navigator.clipboard.writeText(clips[idx].content);
    showToast('COPIED');
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = clips[idx].content;
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('COPIED');
  }
}

function togglePin(idx) {
  if (idx < 0 || idx >= clips.length) return;
  clips[idx].pinned = !clips[idx].pinned;
  if (clips[idx].pinned) {
    // Move to top
    const item = clips.splice(idx, 1)[0];
    clips.unshift(item);
  }
  localStorage.setItem('clips_cache', JSON.stringify(clips));
  renderFastSlots();
  render();
  showToast(clips[0].pinned ? 'PINNED' : 'UNPINNED');
}

function tagClip(idx) {
  if (idx < 0 || idx >= clips.length) return;
  const current = (clips[idx].tags || []).join(', ');
  const tag = prompt('Tag this clip:', current);
  if (tag === null) return;
  clips[idx].tags = tag.split(',').map(t => t.trim()).filter(Boolean);
  localStorage.setItem('clips_cache', JSON.stringify(clips));
  render();
  showToast('TAGGED');
}

async function deleteClip(idx) {
  if (idx < 0 || idx >= clips.length) return;
  if (!confirm('Delete this clip?')) return;
  const id = clips[idx].id;
  await apiDeleteClip(id);
  clips.splice(idx, 1);
  localStorage.setItem('clips_cache', JSON.stringify(clips));
  updateStats();
  renderFastSlots();
  render();
  showToast('DELETED');
}

function openEdit(idx) {
  if (idx < 0 || idx >= clips.length) return;
  document.getElementById('editIdx').value = idx;
  document.getElementById('fieldContent').value = clips[idx].content;
  document.getElementById('fieldTag').value = (clips[idx].tags || []).join(', ');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveEdit() {
  const idx = parseInt(document.getElementById('editIdx').value);
  if (idx < 0 || idx >= clips.length) return;
  clips[idx].content = document.getElementById('fieldContent').value;
  clips[idx].tags = document.getElementById('fieldTag').value.split(',').map(t=>t.trim()).filter(Boolean);
  clips[idx].title = clips[idx].content.substring(0, 60).replace(/\n/g, ' ');
  localStorage.setItem('clips_cache', JSON.stringify(clips));
  closeModal();
  renderFastSlots();
  render();
  showToast('UPDATED');
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
  render();
}

// ============================================================
// HELPERS
// ============================================================
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function formatTimeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  // Ctrl+F = focus search
  if (e.ctrlKey && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

document.getElementById('searchInput').addEventListener('input', e => {
  search = e.target.value;
  render();
});

// ============================================================
// INIT — Poll every 1s for new clips (AHK pushes fast)
// ============================================================
setFilter('all');
fetchClips();
setInterval(fetchClips, 1000);
</script>
</body>
</html>
