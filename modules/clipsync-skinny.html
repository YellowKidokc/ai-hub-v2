<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClipSync</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08080c;--surface:#0e0e14;--card:#13131b;
  --card-hover:#1a1a24;--card-sel:#161625;
  --border:#1c1c28;--border-sel:#2d2d48;
  --text:#b8bcc6;--dim:#6a6a80;--bright:#dde0e8;
  --gold:#e8a912;--gold-dim:rgba(232,169,18,.12);
  --green:#2ecc8e;--green-dim:rgba(46,204,142,.10);
  --red:#d44;--red-dim:rgba(221,68,68,.08);
  --blue:#4ac4d4;--blue-dim:rgba(74,196,212,.08);
  --purple:#8070c8;--purple-dim:rgba(128,112,200,.08);
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --radius:6px;
}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#222230;border-radius:4px;border:2px solid var(--bg);}
::-webkit-scrollbar-thumb:hover{background:#333340;}

body{
  font-family:var(--sans);font-size:12px;
  background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;
  overflow:hidden;user-select:none;
}

/* ───── HEADER ───── */
.header{
  padding:8px 10px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.header-title{
  font-family:var(--mono);font-size:10px;
  color:var(--gold);letter-spacing:2px;
  text-transform:uppercase;font-weight:500;
}
.header-count{
  margin-left:auto;font-family:var(--mono);
  font-size:10px;color:var(--dim);
}

/* ───── SEARCH ───── */
.search-bar{
  padding:6px 10px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.search-input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);padding:6px 10px;
  color:var(--text);font:inherit;font-size:11px;outline:none;
}
.search-input:focus{border-color:rgba(232,169,18,.3);}
.search-input::placeholder{color:#2a2a38;}

/* ───── FAST SLOTS ───── */
.slots{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:3px;padding:6px 10px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.slot{
  padding:4px 2px;text-align:center;background:var(--bg);
  border:1px solid var(--border);border-radius:4px;
  cursor:pointer;transition:all .1s;overflow:hidden;
  min-height:28px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.slot:hover{border-color:var(--gold);background:var(--card);}
.slot:active{transform:scale(.95);}
.slot-num{
  font-family:var(--mono);font-size:9px;
  color:var(--gold);font-weight:500;
}
.slot-preview{
  font-size:8px;color:var(--dim);
  overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;width:100%;padding:0 2px;
}
.slot.empty{opacity:.25;}
.slot.filled .slot-preview{opacity:.7;}

/* ───── FILTER TABS ───── */
.filters{
  display:flex;padding:0 10px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.ftab{
  flex:1;padding:6px 0;text-align:center;
  font-family:var(--mono);font-size:9px;
  letter-spacing:.5px;text-transform:uppercase;
  color:var(--dim);cursor:pointer;
  border-bottom:2px solid transparent;
  background:none;border-top:none;border-left:none;border-right:none;
  transition:all .1s;font-family:var(--mono);
}
.ftab:hover{color:var(--text);}
.ftab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ───── CLIP LIST ───── */
.clip-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:6px 10px;display:flex;
  flex-direction:column;gap:4px;
}

.clip{
  padding:8px 10px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .1s;position:relative;
}
.clip:hover{background:var(--card-hover);border-color:var(--border-sel);}
.clip.selected{
  background:var(--card-sel);border-color:var(--border-sel);
  box-shadow:inset 3px 0 0 var(--gold);
}
.clip-top{
  display:flex;align-items:center;gap:4px;margin-bottom:3px;
}
.clip-num{
  font-family:var(--mono);font-size:9px;
  color:var(--gold);font-weight:500;min-width:16px;
}
.clip-badges{display:flex;gap:3px;margin-left:auto;}
.badge{
  font-family:var(--mono);font-size:8px;
  padding:1px 5px;border-radius:3px;
  letter-spacing:.5px;text-transform:uppercase;
}
.badge-pin{background:var(--gold-dim);color:var(--gold);}
.badge-tag{background:var(--blue-dim);color:var(--blue);}
.badge-slot{background:var(--purple-dim);color:var(--purple);}
.clip-text{
  font-size:11px;color:var(--text);
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
  word-break:break-word;line-height:1.4;
}
.clip-time{
  font-family:var(--mono);font-size:9px;
  color:#222230;margin-top:4px;
}

/* ───── CONTEXT MENU ───── */
.ctx-menu{
  display:none;position:fixed;z-index:999;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:4px 0;
  min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.ctx-menu.open{display:block;}
.ctx-item{
  padding:7px 14px;font-size:11px;color:var(--text);
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:background .08s;
}
.ctx-item:hover{background:var(--card-hover);}
.ctx-item.danger{color:var(--red);}
.ctx-item .ctx-key{
  margin-left:auto;font-family:var(--mono);
  font-size:9px;color:var(--dim);
}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}

/* ───── EDIT MODAL ───── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:100;
  align-items:center;justify-content:center;padding:12px;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:16px;width:100%;
  max-width:350px;max-height:80vh;overflow-y:auto;
}
.modal h3{
  font-family:var(--mono);font-size:10px;
  color:var(--gold);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:12px;
}
.modal label{
  display:block;font-size:10px;color:var(--dim);
  letter-spacing:.5px;text-transform:uppercase;
  margin:10px 0 3px;
}
.modal input,.modal textarea{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);padding:7px 10px;
  color:var(--text);font:inherit;font-size:11px;outline:none;
}
.modal textarea{min-height:100px;resize:vertical;font-family:var(--mono);font-size:11px;}
.modal input:focus,.modal textarea:focus{border-color:rgba(232,169,18,.3);}
.modal-btns{display:flex;gap:6px;margin-top:14px;justify-content:flex-end;}
.mbtn{
  padding:7px 16px;border-radius:var(--radius);
  font:inherit;font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);
  transition:all .1s;background:transparent;color:var(--dim);
}
.mbtn:hover{border-color:#3a3a50;color:var(--text);}
.mbtn.save{background:var(--green);color:#000;border-color:var(--green);}
.mbtn.save:hover{filter:brightness(1.1);}

/* ───── TOAST ───── */
.toast{
  position:fixed;bottom:12px;left:50%;
  transform:translateX(-50%) translateY(50px);
  background:var(--gold);color:#000;
  padding:5px 18px;border-radius:4px;
  font-family:var(--mono);font-size:10px;font-weight:500;
  letter-spacing:1px;z-index:200;
  transition:transform .15s ease;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}

.empty-msg{
  text-align:center;padding:30px 10px;
  color:#1e1e2a;font-family:var(--mono);
  font-size:11px;
}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">ClipSync</span>
  <span class="header-count" id="clipCount">0 clips</span>
</div>

<div class="search-bar">
  <input class="search-input" id="searchInput" placeholder="Search clips..." autocomplete="off">
</div>

<div class="slots" id="slotGrid"></div>

<div class="filters">
  <button class="ftab active" data-f="all" onclick="setFilter('all')">All</button>
  <button class="ftab" data-f="pinned" onclick="setFilter('pinned')">Pin</button>
  <button class="ftab" data-f="tagged" onclick="setFilter('tagged')">Tag</button>
</div>

<div class="clip-list" id="clipList"></div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxCopy()">Copy<span class="ctx-key">click</span></div>
  <div class="ctx-item" onclick="ctxPin()">Pin / Unpin<span class="ctx-key">p</span></div>
  <div class="ctx-item" onclick="ctxTag()">Set Tag<span class="ctx-key">t</span></div>
  <div class="ctx-item" onclick="ctxStickTop()">Stick to Top<span class="ctx-key">↑</span></div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxEdit()">Edit</div>
  <div class="ctx-item" onclick="ctxAssignSlot()">Assign Slot (1-20)</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDelete()">Delete</div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3 id="modalTitle">Edit Clip</h3>
    <label>Content</label>
    <textarea id="editContent"></textarea>
    <label>Tag</label>
    <input id="editTag" placeholder="optional tag">
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal()">Cancel</button>
      <button class="mbtn save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Tag Modal -->
<div class="modal-bg" id="tagModal">
  <div class="modal">
    <h3>Set Tag</h3>
    <label>Tag</label>
    <input id="tagInput" placeholder="e.g. code, url, note">
    <div class="modal-btns">
      <button class="mbtn" onclick="closeTagModal()">Cancel</button>
      <button class="mbtn" onclick="clearTag()">Clear</button>
      <button class="mbtn save" onclick="saveTag()">Save</button>
    </div>
  </div>
</div>

<!-- Slot Modal -->
<div class="modal-bg" id="slotModal">
  <div class="modal">
    <h3>Assign to Slot</h3>
    <label>Slot number (1-20)</label>
    <input id="slotInput" type="number" min="1" max="20" placeholder="1-20">
    <div class="modal-btns">
      <button class="mbtn" onclick="closeSlotModal()">Cancel</button>
      <button class="mbtn" onclick="clearSlot()">Remove</button>
      <button class="mbtn save" onclick="saveSlot()">Assign</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const API = 'http://localhost:3456';
let clips = [];
let filter = 'all';
let searchQ = '';
let selectedIdx = -1;
let ctxIdx = -1;
let pollTimer = null;

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
async function loadClips() {
  try {
    // Try bridge API first
    const r = await fetch(API + '/api/clips');
    if (r.ok) { clips = await r.json(); render(); return; }
  } catch(e) {}
  // Fallback: load from localStorage
  try { clips = JSON.parse(localStorage.getItem('clips') || '[]'); } catch(e) { clips = []; }
  render();
}

async function saveClips() {
  try {
    // Save to bridge
    await fetch(API + '/api/clips', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(clips)
    });
  } catch(e) {}
  // Always save locally too
  localStorage.setItem('clips', JSON.stringify(clips));
}

// Poll for new clips every 2 seconds
function startPolling() {
  pollTimer = setInterval(async () => {
    try {
      const r = await fetch(API + '/api/clips');
      if (r.ok) {
        const fresh = await r.json();
        if (fresh.length !== clips.length ||
            (fresh[0] && clips[0] && fresh[0].text !== clips[0].text)) {
          clips = fresh;
          render();
        }
      }
    } catch(e) {}
  }, 2000);
}


// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  renderSlots();
  renderList();
  document.getElementById('clipCount').textContent = clips.length + ' clips';
}

function renderSlots() {
  const grid = document.getElementById('slotGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 20; i++) {
    const clip = clips.find(c => c.slot === i);
    const el = document.createElement('div');
    el.className = 'slot ' + (clip ? 'filled' : 'empty');
    el.innerHTML = `<span class="slot-num">${i}</span>` +
      (clip ? `<span class="slot-preview">${esc(clip.text.substring(0,20))}</span>` : '');
    el.onclick = () => clip ? copyText(clip.text) : null;
    el.title = clip ? clip.text.substring(0, 100) : `Slot ${i} (empty)`;
    grid.appendChild(el);
  }
}

function renderList() {
  const list = document.getElementById('clipList');
  list.innerHTML = '';
  const q = searchQ.toLowerCase();
  let filtered = clips.filter(c => {
    if (filter === 'pinned' && !c.pinned) return false;
    if (filter === 'tagged' && !c.tag) return false;
    if (q && !c.text.toLowerCase().includes(q) &&
        !(c.tag && c.tag.toLowerCase().includes(q))) return false;
    return true;
  });
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-msg">No clips' +
      (q ? ' matching "' + esc(q) + '"' : '') + '</div>';
    return;
  }
  filtered.forEach((clip, fi) => {
    const realIdx = clips.indexOf(clip);
    const el = document.createElement('div');
    el.className = 'clip' + (realIdx === selectedIdx ? ' selected' : '');
    el.dataset.idx = realIdx;
    let badges = '';
    if (clip.pinned) badges += '<span class="badge badge-pin">PIN</span>';
    if (clip.tag) badges += `<span class="badge badge-tag">${esc(clip.tag)}</span>`;
    if (clip.slot) badges += `<span class="badge badge-slot">#${clip.slot}</span>`;
    el.innerHTML =
      `<div class="clip-top">` +
        `<span class="clip-num">${realIdx + 1}</span>` +
        `<div class="clip-badges">${badges}</div>` +
      `</div>` +
      `<div class="clip-text">${esc(clip.text)}</div>` +
      (clip.time ? `<div class="clip-time">${clip.time}</div>` : '');
    el.onclick = () => { selectedIdx = realIdx; copyText(clip.text); render(); };
    el.oncontextmenu = (e) => { e.preventDefault(); showCtx(e, realIdx); };
    list.appendChild(el);
  });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Copied')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('Copied');
  });
}

function addClip(text, opts = {}) {
  if (!text || !text.trim()) return;
  // Deduplicate
  const existing = clips.findIndex(c => c.text === text);
  if (existing === 0) return; // Already at top
  let pin = false, tag = '', slot = null;
  if (existing > 0) {
    pin = clips[existing].pinned; tag = clips[existing].tag; slot = clips[existing].slot;
    clips.splice(existing, 1);
  }
  const clip = {
    text, pinned: opts.pinned || pin, tag: opts.tag || tag,
    slot: opts.slot || slot,
    time: new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'})
  };
  // Insert after pinned items
  let insertAt = 0;
  if (!clip.pinned) {
    insertAt = clips.findIndex(c => !c.pinned);
    if (insertAt < 0) insertAt = clips.length;
  }
  clips.splice(insertAt, 0, clip);
  if (clips.length > 500) clips.length = 500;
  saveClips(); render();
}

function pinClip(idx) {
  if (idx < 0 || idx >= clips.length) return;
  clips[idx].pinned = !clips[idx].pinned;
  if (clips[idx].pinned) {
    const c = clips.splice(idx, 1)[0];
    clips.unshift(c);
  }
  saveClips(); render();
}

function deleteClip(idx) {
  if (idx < 0 || idx >= clips.length) return;
  clips.splice(idx, 1);
  selectedIdx = -1;
  saveClips(); render();
}

function stickTop(idx) {
  if (idx < 0 || idx >= clips.length) return;
  const c = clips.splice(idx, 1)[0];
  clips.unshift(c); saveClips(); render();
}

// ═══════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════
function showCtx(e, idx) {
  ctxIdx = idx; selectedIdx = idx;
  const menu = document.getElementById('ctxMenu');
  menu.classList.add('open');
  let x = e.clientX, y = e.clientY;
  if (x + 170 > window.innerWidth) x = window.innerWidth - 175;
  if (y + 250 > window.innerHeight) y = window.innerHeight - 255;
  menu.style.left = x + 'px'; menu.style.top = y + 'px';
  render();
}
function hideCtx() { document.getElementById('ctxMenu').classList.remove('open'); }
document.addEventListener('click', hideCtx);

function ctxCopy() { if (ctxIdx >= 0) copyText(clips[ctxIdx].text); }
function ctxPin() { if (ctxIdx >= 0) pinClip(ctxIdx); }
function ctxStickTop() { if (ctxIdx >= 0) stickTop(ctxIdx); }
function ctxDelete() { if (ctxIdx >= 0) deleteClip(ctxIdx); }

function ctxTag() {
  if (ctxIdx < 0) return;
  document.getElementById('tagInput').value = clips[ctxIdx].tag || '';
  document.getElementById('tagModal').classList.add('open');
}
function closeTagModal() { document.getElementById('tagModal').classList.remove('open'); }
function clearTag() {
  if (ctxIdx >= 0) { clips[ctxIdx].tag = ''; saveClips(); render(); }
  closeTagModal();
}
function saveTag() {
  if (ctxIdx >= 0) {
    clips[ctxIdx].tag = document.getElementById('tagInput').value.trim();
    saveClips(); render();
  }
  closeTagModal();
}

function ctxEdit() {
  if (ctxIdx < 0) return;
  document.getElementById('editContent').value = clips[ctxIdx].text;
  document.getElementById('editTag').value = clips[ctxIdx].tag || '';
  document.getElementById('modalTitle').textContent = 'Edit Clip';
  document.getElementById('editModal').classList.add('open');
}
function closeModal() { document.getElementById('editModal').classList.remove('open'); }
function saveEdit() {
  if (ctxIdx >= 0) {
    clips[ctxIdx].text = document.getElementById('editContent').value;
    clips[ctxIdx].tag = document.getElementById('editTag').value.trim();
    saveClips(); render();
  }
  closeModal();
}

function ctxAssignSlot() {
  if (ctxIdx < 0) return;
  document.getElementById('slotInput').value = clips[ctxIdx].slot || '';
  document.getElementById('slotModal').classList.add('open');
}
function closeSlotModal() { document.getElementById('slotModal').classList.remove('open'); }
function clearSlot() {
  if (ctxIdx >= 0) { clips[ctxIdx].slot = null; saveClips(); render(); }
  closeSlotModal();
}
function saveSlot() {
  const n = parseInt(document.getElementById('slotInput').value);
  if (n >= 1 && n <= 20 && ctxIdx >= 0) {
    // Clear any other clip from this slot
    clips.forEach(c => { if (c.slot === n) c.slot = null; });
    clips[ctxIdx].slot = n;
    saveClips(); render();
  }
  closeSlotModal();
}


// ═══════════════════════════════════════════
// FILTER & SEARCH
// ═══════════════════════════════════════════
function setFilter(f) {
  filter = f;
  document.querySelectorAll('.ftab').forEach(t => {
    t.classList.toggle('active', t.dataset.f === f);
  });
  render();
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQ = e.target.value;
  render();
});

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  // Escape closes modals
  if (e.key === 'Escape') {
    closeModal(); closeTagModal(); closeSlotModal(); hideCtx();
  }
  // Don't handle keys when in input/textarea
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, clips.length - 1);
    render(); scrollToSelected();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, 0);
    render(); scrollToSelected();
  } else if (e.key === 'Enter' && selectedIdx >= 0) {
    copyText(clips[selectedIdx].text);
  } else if (e.key === 'p' && selectedIdx >= 0) {
    pinClip(selectedIdx);
  } else if (e.key === 'Delete' && selectedIdx >= 0) {
    deleteClip(selectedIdx);
  } else if (e.key === '/') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

function scrollToSelected() {
  const el = document.querySelector('.clip.selected');
  if (el) el.scrollIntoView({ block: 'nearest' });
}

// ═══════════════════════════════════════════
// CLIPBOARD MONITORING (browser-based fallback)
// ═══════════════════════════════════════════
let lastClipText = '';
async function checkClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (text && text !== lastClipText) {
      lastClipText = text;
      addClip(text);
    }
  } catch(e) {
    // Permission denied — clipboard monitoring needs focus
  }
}
// Only monitor when window is focused
window.addEventListener('focus', () => {
  checkClipboard();
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadClips();
startPolling();
</script>
