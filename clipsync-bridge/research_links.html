<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POF 2828 - Research Links</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0c10;--pane:#111318;--card:#151720;--card-hover:#1a1d2a;--border:#222538;--border-sel:#3d4060;--text:#c0c4d0;--text2:#7a7d96;--bright:#eaecf2;--gold:#e8a912;--gold-dim:rgba(232,169,18,.12);--green:#2ecc8e;--green-dim:rgba(46,204,142,.10);--red:#d44;--red-dim:rgba(221,68,68,.08);--cyan:#4ac4d4;--cyan-dim:rgba(74,196,212,.08);--purple:#8070c8;--purple-dim:rgba(128,112,200,.10);--blue:#3b82f6;--blue-dim:rgba(59,130,246,.10);--font:'DM Mono','Menlo',monospace;--radius:8px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2d40;border-radius:3px}
body{font-family:var(--font);font-size:11px;line-height:1.4;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;max-width:380px;margin:0 auto}
.topbar{display:flex;align-items:center;gap:6px;padding:5px 6px;background:var(--pane);border-bottom:1px solid var(--border);flex-shrink:0}.search-wrap{flex:1;position:relative}.search-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px 5px 24px;color:var(--text);font:inherit;outline:none;font-size:10px}.search-input:focus{border-color:var(--gold)}.search-input::placeholder{color:#2e2e3e}.search-icon{position:absolute;left:7px;top:50%;transform:translateY(-50%);color:#2e2e3e;font-size:11px;pointer-events:none}.brand{color:var(--gold);font-weight:500;font-size:9px;letter-spacing:1.5px;flex-shrink:0}.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}.status-dot.offline{background:var(--red);box-shadow:0 0 6px var(--red)}
.tab-bar{display:flex;align-items:center;background:var(--pane);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 2px;overflow-x:auto}.tab{flex:1;padding:4px 6px;text-align:center;background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font:inherit;cursor:pointer;font-size:8px;letter-spacing:.6px;text-transform:uppercase;min-width:56px}.tab:hover{color:var(--text)}.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.card-scroll{flex:1;overflow-y:auto;padding:4px}
.link-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:4px}.link-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:6px;min-height:110px;display:flex;flex-direction:column;gap:5px;cursor:pointer;transition:all .1s}.link-card:hover{background:var(--card-hover)}.link-card.selected{border-color:var(--border-sel);box-shadow:inset 0 0 0 1px rgba(74,196,212,.16)}.link-head{display:flex;align-items:center;justify-content:space-between;gap:4px}.link-cat{color:var(--gold);font-size:8px;letter-spacing:1px;text-transform:uppercase}.link-state{color:var(--text2);font-size:8px;text-transform:uppercase;letter-spacing:.8px}.link-body{flex:1;display:flex;flex-direction:column;gap:3px;min-height:0}.link-title{color:var(--bright);font-size:10px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.link-url{color:var(--text2);font-size:8px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-all}.card-tags{display:flex;gap:3px;flex-wrap:wrap}.ctag{padding:1px 5px;border:1px solid rgba(74,196,212,.18);border-radius:3px;font-size:7px;letter-spacing:.3px;text-transform:uppercase;color:var(--cyan);background:var(--cyan-dim)}
.link-actions{display:grid;grid-template-columns:1fr 1fr 32px 32px;gap:4px}.slot-btn{display:flex;align-items:center;justify-content:center;padding:5px 0;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text2);font:inherit;cursor:pointer;font-size:8px;transition:all .1s}.slot-btn:hover{border-color:var(--gold);color:var(--gold)}.slot-btn.open{color:var(--blue);border-color:rgba(59,130,246,.2);background:var(--blue-dim)}.slot-btn.copy{color:var(--green);border-color:rgba(46,204,142,.2);background:var(--green-dim)}.slot-btn.icon{font-size:13px;padding:0}
.tools-bar{display:flex;align-items:center;gap:4px;padding:4px 6px;background:var(--pane);border-top:1px solid var(--border);flex-shrink:0}.tbtn{padding:4px 8px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text2);font:inherit;cursor:pointer;font-size:11px;transition:all .1s;min-width:32px;text-align:center}.tbtn:hover{border-color:var(--gold);color:var(--gold)}.tbtn.on{color:var(--gold);background:var(--gold-dim);border-color:rgba(232,169,18,.3)}.tbtn.add{margin-left:auto;color:var(--gold);border-color:rgba(232,169,18,.3);background:var(--gold-dim);font-size:9px;padding:4px 10px}
.files-bar{display:flex;align-items:center;gap:3px;padding:4px 6px;background:var(--pane);border-top:1px solid var(--border);flex-shrink:0}.fbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:5px 4px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text2);font:inherit;cursor:pointer;font-size:9px;letter-spacing:.4px;transition:all .12s}.fbtn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim)}.fbtn.active{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim)}.fbtn-icon{font-size:13px}
.files-panel{display:none;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;max-height:200px;overflow-y:auto}.files-panel.open{display:block}.fp-header{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--pane);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}.fp-title{font-size:9px;color:var(--cyan);letter-spacing:1px;text-transform:uppercase;font-weight:500}.fp-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:2px 4px}.fp-close:hover{color:var(--bright)}.fp-list{padding:4px}.fp-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;cursor:pointer;transition:all .1s;font-size:10px;color:var(--text)}.fp-item:hover{background:var(--card-hover)}.fp-item-icon{font-size:12px;flex-shrink:0;width:18px;text-align:center}.fp-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.fp-item-size{font-size:8px;color:var(--text2);flex-shrink:0}.fp-empty,.fp-loading{text-align:center;padding:16px 8px;color:var(--text2);font-size:9px}
.nav-bar{display:flex;align-items:center;gap:4px;padding:5px 6px;background:var(--pane);border-top:1px solid var(--border);flex-shrink:0}.nbtn{width:40px;height:36px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);font:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .1s}.nbtn:hover{border-color:var(--gold);color:var(--gold)}.nav-info{flex:1;text-align:center;color:var(--text2);font-size:10px}.nav-info b{color:var(--gold)}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--gold);color:#000;padding:3px 12px;border-radius:4px;font-weight:500;letter-spacing:1px;z-index:200;transition:transform .18s;pointer-events:none;font-size:9px}.toast.show{transform:translateX(-50%) translateY(0)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center;padding:8px}.modal-bg.open{display:flex}.modal{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;width:100%;max-width:340px;max-height:85vh;overflow-y:auto}.modal h2{font-weight:500;color:var(--gold);letter-spacing:2px;margin-bottom:8px;font-size:10px}.modal label{display:block;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin:6px 0 2px;font-size:8px}.modal input,.modal textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font:inherit;outline:none;font-size:10px}.modal textarea{min-height:72px;resize:vertical}.modal input:focus,.modal textarea:focus{border-color:var(--gold)}.mrow{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}.mbtn{padding:4px 12px;border-radius:6px;font:inherit;font-weight:500;cursor:pointer;border:1px solid var(--border);font-size:9px}.mbtn.save{background:var(--green);color:#000;border-color:var(--green)}.mbtn.cancel{background:transparent;color:var(--text2)}.empty{text-align:center;padding:30px 10px;color:#2a2d40;font-size:10px}
</style>
</head>
<body>
<div class="topbar"><div class="search-wrap"><span class="search-icon">&#x2315;</span><input class="search-input" id="searchInput" placeholder="Search links..." autocomplete="off"></div><span class="status-dot" id="statusDot"></span><span class="brand">POF 2828</span></div>
<div class="tab-bar" id="tabBar"></div>
<div class="card-scroll" id="cardArea"></div>
<div class="tools-bar"><button class="tbtn" id="btnPin" onclick="togglePin()" title="Stay on top">&#x1F4CC;</button><button class="tbtn" id="btnPos" onclick="saveWindowPos()" title="Save position">&#x1F4BE;</button><button class="tbtn" onclick="deduplicate()" title="Remove duplicates">&#x1F9F9;</button><button class="tbtn" onclick="exportData()" title="Export">&#x2B07;</button><button class="tbtn" onclick="document.getElementById('fileInput').click()" title="Import">&#x2B06;</button><button class="tbtn add" onclick="openAdd()">+ New</button></div>
<div class="files-bar"><button class="fbtn" data-folder="documents" onclick="toggleFiles('documents')"><span class="fbtn-icon">&#x1F4C4;</span>Docs</button><button class="fbtn" data-folder="videos" onclick="toggleFiles('videos')"><span class="fbtn-icon">&#x1F3AC;</span>Video</button><button class="fbtn" data-folder="music" onclick="toggleFiles('music')"><span class="fbtn-icon">&#x1F3B5;</span>Music</button><button class="fbtn" data-folder="pictures" onclick="toggleFiles('pictures')"><span class="fbtn-icon">&#x1F5BC;</span>Pics</button></div>
<div class="files-panel" id="filesPanel"><div class="fp-header"><span class="fp-title" id="fpTitle">Documents</span><button class="fp-close" onclick="closeFiles()">&#x2715;</button></div><div class="fp-list" id="fpList"></div></div>
<div class="nav-bar"><button class="nbtn" onclick="navPage(-1)">&#x25C0;</button><button class="nbtn" onclick="navPage(1)">&#x25B6;</button><button class="nbtn" onclick="moveSelUp()" style="font-size:14px">&#x25B2;</button><button class="nbtn" onclick="moveSelDown()" style="font-size:14px">&#x25BC;</button><span class="nav-info"><b id="pn">1</b>/<span id="pt">1</span> &middot; <span id="cc">0</span></span></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal"><h2 id="modalTitle">NEW LINK</h2><input type="hidden" id="editId"><label>Title</label><input id="fTitle" placeholder="Open Corporates"><label>URL</label><textarea id="fUrl" placeholder="https://..."></textarea><label>Category</label><input id="fCategory" placeholder="Research"><label>Tags (comma sep)</label><input id="fTags" placeholder="api, corporate"><div class="mrow"><button class="mbtn cancel" onclick="closeModal()">Cancel</button><button class="mbtn save" onclick="saveBookmark()">Save</button></div></div></div>
<div class="toast" id="toast"></div><input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">
<script>
const API='http://localhost:3456/api',PS=20,WINDOW_TITLE='POF 2828 - Research Links',POLL_INTERVAL=4000;
let bookmarks=[],filteredList=[],sel=-1,pg=0,search='',activeCategory='all',pinned=false,serverOnline=false,activeFolder=null;
const FILE_FOLDERS={documents:{label:'Documents'},videos:{label:'Videos'},music:{label:'Music'},pictures:{label:'Pictures'}};
const FILE_ICONS={pdf:'\u{1F4D5}',doc:'\u{1F4DD}',docx:'\u{1F4DD}',txt:'\u{1F4C3}',md:'\u{1F4C3}',mp4:'\u{1F3AC}',mkv:'\u{1F3AC}',avi:'\u{1F3AC}',mov:'\u{1F3AC}',webm:'\u{1F3AC}',mp3:'\u{1F3B5}',wav:'\u{1F3B5}',flac:'\u{1F3B5}',ogg:'\u{1F3B5}',m4a:'\u{1F3B5}',jpg:'\u{1F5BC}',jpeg:'\u{1F5BC}',png:'\u{1F5BC}',gif:'\u{1F5BC}',webp:'\u{1F5BC}',svg:'\u{1F5BC}',bmp:'\u{1F5BC}',zip:'\u{1F4E6}',rar:'\u{1F4E6}','7z':'\u{1F4E6}',xlsx:'\u{1F4CA}',xls:'\u{1F4CA}',csv:'\u{1F4CA}',pptx:'\u{1F4CA}',json:'\u2699',html:'\u{1F310}',js:'\u2699',py:'\u2699'};
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1200)}
function sig(){return bookmarks.length+':'+(bookmarks[0]?.id||'')+':'+(bookmarks[bookmarks.length-1]?.id||'')}
function formatFileSize(bytes){if(!bytes||bytes<0)return'';if(bytes<1024)return bytes+'B';if(bytes<1048576)return(bytes/1024).toFixed(1)+'K';if(bytes<1073741824)return(bytes/1048576).toFixed(1)+'M';return(bytes/1073741824).toFixed(1)+'G'}
function getFileIcon(name){const ext=(name.split('.').pop()||'').toLowerCase();return FILE_ICONS[ext]||'\u{1F4C4}'}
function formatUrl(url,max=90){return esc((url||'').replace(/^https?:\/\//,'').slice(0,max))}
function categoryKey(v){return (v||'general').toLowerCase()}
async function load(){try{const r=await fetch(API+'/bookmarks');if(r.ok){const data=await r.json();if(Array.isArray(data))bookmarks=data;serverOnline=true}else serverOnline=false}catch{serverOnline=false}document.getElementById('statusDot').classList.toggle('offline',!serverOnline)}
async function apiCreate(b){await fetch(API+'/bookmarks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})}
async function apiSave(id,b){await fetch(API+'/bookmarks/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})}
async function apiDelete(id){await fetch(API+'/bookmarks/'+id,{method:'DELETE'})}
async function togglePin(force){pinned=typeof force==='boolean'?force:!pinned;document.getElementById('btnPin').classList.toggle('on',pinned);try{const r=await fetch(API.replace('/api','')+'/window/pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:WINDOW_TITLE,pinned})});if(!r.ok)throw new Error();toast(pinned?'Pinned':'Unpinned')}catch{toast('Pin: server error')}}
async function saveWindowPos(){const pos={x:screenX,y:screenY,w:outerWidth,h:outerHeight};localStorage.setItem('pof_links_pos',JSON.stringify(pos));try{await fetch(API.replace('/api','')+'/window/position',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:WINDOW_TITLE,...pos})});toast('Position saved')}catch{toast('Saved locally')}}
async function restoreWindowPos(){try{const r=await fetch(API+'/window-state');if(r.ok){const state=await r.json();const pos=state.position;const pin=state.pin;if(pos&&typeof pos.x==='number'){resizeTo(pos.w||outerWidth,pos.h||outerHeight);moveTo(pos.x,pos.y)}if(pin&&pin.pinned){pinned=true;document.getElementById('btnPin').classList.add('on');setTimeout(()=>togglePin(true),200)}}}catch{}}
function categories(){return ['all',...new Set(bookmarks.map(b=>b.category||'General'))]}
function renderTabs(){document.getElementById('tabBar').innerHTML=categories().map(cat=>`<button class="tab ${activeCategory===cat?'active':''}" onclick="setCategory('${esc(cat)}')">${esc(cat.toUpperCase())}</button>`).join('')}
function setCategory(cat){activeCategory=cat;pg=0;sel=-1;renderTabs();render()}
function filteredBookmarks(){let list=bookmarks;if(activeCategory!=='all')list=list.filter(b=>(b.category||'General').toLowerCase()===activeCategory.toLowerCase());if(search){const q=search.toLowerCase();list=list.filter(b=>(b.title||'').toLowerCase().includes(q)||(b.url||'').toLowerCase().includes(q)||((b.tags||[]).join(' ')).toLowerCase().includes(q))}return list}
function render(){renderTabs();const area=document.getElementById('cardArea');filteredList=filteredBookmarks();const tp=Math.ceil(filteredList.length/PS)||1;pg=Math.min(pg,tp-1);const paged=filteredList.slice(pg*PS,(pg+1)*PS);document.getElementById('pn').textContent=tp?pg+1:0;document.getElementById('pt').textContent=tp;document.getElementById('cc').textContent=filteredList.length+' links';if(!paged.length){area.innerHTML='<div class="empty">No links found</div>';return}area.innerHTML='<div class="link-grid">'+paged.map((b,i)=>buildCard(b,pg*PS+i)).join('')+'</div>'}
function buildCard(b,globalIdx){const localSel=sel===globalIdx?' selected':'';const tags=(b.tags||[]).slice(0,3).map(t=>`<span class="ctag">${esc(t)}</span>`).join('');return`<div class="link-card${localSel}" onclick="setSel(${globalIdx})"><div class="link-head"><span class="link-cat">${esc(b.category||'General')}</span><span class="link-state">READY</span></div><div class="link-body"><div class="link-title">${esc(b.title||'Untitled')}</div><div class="link-url">${formatUrl(b.url)}</div><div class="card-tags">${tags}</div></div><div class="link-actions"><button class="slot-btn open" onclick="event.stopPropagation();openBookmark('${escJs(b.id)}')">OPEN</button><button class="slot-btn copy" onclick="event.stopPropagation();copyUrl('${escJs(b.url||'')}')">COPY</button><button class="slot-btn icon" onclick="event.stopPropagation();openEditById('${escJs(b.id)}')">&#x270F;</button><button class="slot-btn icon" onclick="event.stopPropagation();deleteById('${escJs(b.id)}')">&#xD7;</button></div></div>`}
function escJs(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function setSel(i){sel=i;render()}
function navPage(d){const tp=Math.ceil(filteredList.length/PS)||1;pg=Math.max(0,Math.min(tp-1,pg+d));sel=-1;render()}
function currentSelection(){if(sel<0||sel>=filteredList.length)return null;return filteredList[sel]}
async function moveSelUp(){const item=currentSelection();if(!item||!item.id)return;const idx=bookmarks.findIndex(b=>b.id===item.id);if(idx<=0)return;[bookmarks[idx-1],bookmarks[idx]]=[bookmarks[idx],bookmarks[idx-1]];render();toast('Moved up')}
async function moveSelDown(){const item=currentSelection();if(!item||!item.id)return;const idx=bookmarks.findIndex(b=>b.id===item.id);if(idx<0||idx>=bookmarks.length-1)return;[bookmarks[idx+1],bookmarks[idx]]=[bookmarks[idx],bookmarks[idx+1]];render();toast('Moved down')}
async function copyUrl(url){try{await navigator.clipboard.writeText(url);toast('Copied')}catch{toast('Copy failed')}}
function openBookmark(id){const b=bookmarks.find(x=>x.id===id);if(!b)return;window.open(b.url,'_blank');toast('Opened')}
function openAdd(){document.getElementById('modalTitle').textContent='NEW LINK';document.getElementById('editId').value='';document.getElementById('fTitle').value='';document.getElementById('fUrl').value='';document.getElementById('fCategory').value=activeCategory!=='all'?activeCategory:'Research';document.getElementById('fTags').value='';document.getElementById('modalBg').classList.add('open');setTimeout(()=>document.getElementById('fTitle').focus(),80)}
function openEditById(id){const b=bookmarks.find(x=>x.id===id);if(!b)return;document.getElementById('modalTitle').textContent='EDIT LINK';document.getElementById('editId').value=id;document.getElementById('fTitle').value=b.title||'';document.getElementById('fUrl').value=b.url||'';document.getElementById('fCategory').value=b.category||'';document.getElementById('fTags').value=(b.tags||[]).join(', ');document.getElementById('modalBg').classList.add('open')}
function closeModal(){document.getElementById('modalBg').classList.remove('open')}
async function saveBookmark(){const id=document.getElementById('editId').value;const data={title:document.getElementById('fTitle').value.trim(),url:document.getElementById('fUrl').value.trim(),category:document.getElementById('fCategory').value.trim()||'General',tags:document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean)};if(!data.title||!data.url){toast('Need title + URL');return}try{if(id){await apiSave(id,data)}else{await apiCreate(data)}await load();closeModal();render();toast(id?'Updated':'Saved')}catch{toast('Save failed')}}
async function deleteById(id){if(!confirm('Delete this link?'))return;try{await apiDelete(id);await load();render();toast('Deleted')}catch{toast('Delete failed')}}
async function deduplicate(){const byUrl=new Set();const dupes=[];bookmarks.forEach(b=>{const key=(b.url||'').trim().toLowerCase();if(!key)return;if(byUrl.has(key))dupes.push(b.id);else byUrl.add(key)});if(!dupes.length){toast('No duplicates');return}if(!confirm(`Delete ${dupes.length} duplicate links?`))return;for(const id of dupes)await apiDelete(id);await load();render();toast(`Removed ${dupes.length}`)}
function exportData(){const blob=new Blob([JSON.stringify(bookmarks,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pof2828_links_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Exported')}
function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{try{const data=JSON.parse(ev.target.result);if(!Array.isArray(data))throw 0;for(const item of data){if(item.title&&item.url)await apiCreate({title:item.title,url:item.url,category:item.category||'General',tags:item.tags||[]})}await load();render();toast('Imported')}catch{toast('Bad file')}};r.readAsText(f);e.target.value=''}
function toggleFiles(folder){const panel=document.getElementById('filesPanel');if(activeFolder===folder){closeFiles();return;}activeFolder=folder;document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.dataset.folder===folder));document.getElementById('fpTitle').textContent=FILE_FOLDERS[folder].label;document.getElementById('fpList').innerHTML='<div class="fp-loading">Loading...</div>';panel.classList.add('open');loadFiles(folder)}
function closeFiles(){activeFolder=null;document.getElementById('filesPanel').classList.remove('open');document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'))}
async function loadFiles(folder){const list=document.getElementById('fpList');try{const r=await fetch(API+'/files/'+folder);if(!r.ok)throw new Error('Server returned '+r.status);const files=await r.json();if(!files.length){list.innerHTML='<div class="fp-empty">Folder empty</div>';return;}list.innerHTML=files.map(f=>`<div class="fp-item" onclick="openFile('${escJs(f.path)}')"><span class="fp-item-icon">${getFileIcon(f.name)}</span><span class="fp-item-name" title="${esc(f.name)}">${esc(f.name)}</span><span class="fp-item-size">${formatFileSize(f.size)}</span></div>`).join('')}catch(e){list.innerHTML='<div class="fp-empty">'+esc(e.message)+'</div>'}}
function openFile(path){fetch(API+'/files/open',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})}).then(r=>{if(r.ok)toast('Opened');else throw 0;}).catch(()=>{navigator.clipboard.writeText(path).then(()=>toast('Path copied'));})}
document.getElementById('searchInput').addEventListener('input',e=>{search=e.target.value;pg=0;sel=-1;render()});
document.addEventListener('keydown',e=>{const modalOpen=document.getElementById('modalBg').classList.contains('open');const inp=['INPUT','TEXTAREA'].includes(document.activeElement.tagName);if(e.key==='Escape'){if(modalOpen)closeModal();return}if(modalOpen||inp)return;if(e.key==='ArrowLeft'){e.preventDefault();navPage(-1)}if(e.key==='ArrowRight'){e.preventDefault();navPage(1)}if(e.key==='ArrowUp'){e.preventDefault();moveSelUp()}if(e.key==='ArrowDown'){e.preventDefault();moveSelDown()}if(e.ctrlKey&&e.shiftKey&&e.key==='N'){e.preventDefault();openAdd()}});
async function init(){await restoreWindowPos();await load();render()}init();let lsig='';setInterval(async()=>{const old=lsig;await load();const now=sig();if(old&&now!==old)render();lsig=now},POLL_INTERVAL);
</script>
</body>
